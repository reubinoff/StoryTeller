name: Backend Serverless CI/CD

on:
  pull_request:
    paths:
      - "backend-serverless/**"
      - "client/**"
      - ".github/workflows/backend-serverless-ci-cd.yml"
  push:
    branches: ["main"]
    paths:
      - "backend-serverless/**"
      - "client/**"
      - ".github/workflows/backend-serverless-ci-cd.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "22"
  AZURE_FUNCTIONAPP_PACKAGE_PATH: "backend-serverless"
  AZURE_FUNCTIONAPP_NAME: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
  AZURE_FUNCTIONAPP_BASE_URL: ${{ vars.AZURE_FUNCTIONAPP_BASE_URL }}

jobs:
  serverless-tests:
    name: Serverless backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v5
      - name: Run serverless pytest
        working-directory: backend-serverless
        env:
          UV_PROJECT_ENVIRONMENT: ${{ runner.temp }}/backend-serverless-venv
        run: uv run --frozen pytest -q

  client-tests:
    name: Client tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install client dependencies
        working-directory: client
        run: npm ci
      - name: Run Vitest
        working-directory: client
        env:
          NODE_OPTIONS: --localstorage-file=${{ runner.temp }}/vitest-localstorage
        run: npm run test:run

  deploy-production:
    name: Deploy production Function App
    runs-on: ubuntu-latest
    needs:
      - serverless-tests
      - client-tests
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    # Serialize production deploys: a newly triggered deploy waits for the
    # in-progress one to finish before it starts (no cancellation).
    concurrency:
      group: backend-deploy-production
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    environment: production
    steps:
      - uses: actions/checkout@v6
      - name: Log in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy Azure Functions app
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          respect-funcignore: true
          remote-build: true
      - name: Smoke test health endpoint
        shell: bash
        run: |
          set -euo pipefail
          base_url="${AZURE_FUNCTIONAPP_BASE_URL:-https://${AZURE_FUNCTIONAPP_NAME}.azurewebsites.net}"
          curl --fail --show-error --silent "$base_url/healthz"
