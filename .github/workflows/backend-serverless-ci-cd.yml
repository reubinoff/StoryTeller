name: Backend Serverless CI/CD

on:
  pull_request:
    paths:
      - "backend-serverless/**"
      - "client/**"
      - "admin-client/**"
      - ".github/workflows/backend-serverless-ci-cd.yml"
  push:
    branches: ["main"]
    paths:
      - "backend-serverless/**"
      - "client/**"
      - "admin-client/**"
      - ".github/workflows/backend-serverless-ci-cd.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "22"
  AZURE_FUNCTIONAPP_PACKAGE_PATH: "backend-serverless"
  AZURE_FUNCTIONAPP_NAME: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
  AZURE_FUNCTIONAPP_BASE_URL: ${{ vars.AZURE_FUNCTIONAPP_BASE_URL }}

jobs:
  serverless-tests:
    name: Serverless backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v5
      - name: Verify Azure Functions requirements export
        working-directory: backend-serverless
        run: |
          uv export --frozen --no-dev --format requirements-txt --no-hashes --output-file requirements.txt
          git diff --exit-code -- requirements.txt
      - name: Smoke test Azure Functions requirements
        working-directory: backend-serverless
        run: |
          python -m venv "$RUNNER_TEMP/backend-functions-requirements"
          source "$RUNNER_TEMP/backend-functions-requirements/bin/activate"
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python - <<'PY'
          from azure.core.pipeline.transport import AioHttpTransport
          import aiohttp
          import uvicorn

          assert AioHttpTransport
          assert aiohttp.__version__
          assert uvicorn.__version__
          PY
      - name: Run serverless pytest
        working-directory: backend-serverless
        env:
          UV_PROJECT_ENVIRONMENT: ${{ runner.temp }}/backend-serverless-venv
        run: uv run --frozen pytest -q

  client-tests:
    name: Client tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install client dependencies
        working-directory: client
        run: npm ci
      - name: Run Vitest
        working-directory: client
        env:
          NODE_OPTIONS: --localstorage-file=${{ runner.temp }}/vitest-localstorage
        run: npm run test:run

  admin-client-tests:
    name: Admin client tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: admin-client/package-lock.json
      - name: Install admin client dependencies
        working-directory: admin-client
        run: npm ci
      - name: Run admin client checks
        working-directory: admin-client
        run: |
          npm run typecheck
          npm run test:run

  deploy-production:
    name: Deploy production Function App
    runs-on: ubuntu-latest
    needs:
      - serverless-tests
      - client-tests
      - admin-client-tests
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    # Serialize production deploys: a newly triggered deploy waits for the
    # in-progress one to finish before it starts (no cancellation).
    concurrency:
      group: backend-deploy-production
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v5
      - name: Smoke test configured LLM provider
        working-directory: backend-serverless
        env:
          UV_PROJECT_ENVIRONMENT: ${{ runner.temp }}/backend-llm-smoke-venv
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'anthropic' }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_MAX_TOKENS: ${{ vars.LLM_SMOKE_MAX_TOKENS || '1024' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ vars.AZURE_OPENAI_API_VERSION }}
        run: uv run --frozen python scripts/smoke_llm_provider.py
      - name: Log in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy Azure Functions app
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          respect-funcignore: true
          remote-build: true
      - name: Smoke test health endpoint
        shell: bash
        run: |
          set -euo pipefail
          base_url="${AZURE_FUNCTIONAPP_BASE_URL:-https://${AZURE_FUNCTIONAPP_NAME}.azurewebsites.net}"
          curl --fail --show-error --silent "$base_url/healthz"
