name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "client/**"
      - ".github/workflows/azure-static-web-apps-calm-field-0f498ee10.yml"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - "client/**"
      - ".github/workflows/azure-static-web-apps-calm-field-0f498ee10.yml"

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          lfs: false
      - name: Configure frontend production API
        working-directory: client
        env:
          AZURE_FUNCTIONAPP_BASE_URL: ${{ vars.AZURE_FUNCTIONAPP_BASE_URL }}
          AZURE_FUNCTIONAPP_NAME: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
        run: |
          set -euo pipefail
          base_url="${AZURE_FUNCTIONAPP_BASE_URL:-}"
          if [ -z "$base_url" ]; then
            if [ -z "${AZURE_FUNCTIONAPP_NAME:-}" ]; then
              echo "::error::Set AZURE_FUNCTIONAPP_BASE_URL or AZURE_FUNCTIONAPP_NAME as a repository variable."
              exit 1
            fi
            base_url="https://${AZURE_FUNCTIONAPP_NAME}.azurewebsites.net"
          fi
          base_url="${base_url%/}"
          base_url="${base_url%/api/v1}"
          base_url="${base_url%/}"
          {
            echo "VITE_USE_MOCK=false"
            echo "VITE_API_BASE_URL=${base_url}/api/v1"
          } > .env.production.local
          echo "Configured production API: ${base_url}/api/v1"
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CALM_FIELD_0F498EE10 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "./client" # App source code path
          api_location: "" # Api source code path - optional
          output_location: "build/client" # Built app content directory - optional
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CALM_FIELD_0F498EE10 }}
          action: "close"
