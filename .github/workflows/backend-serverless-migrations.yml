name: Backend Serverless Manual Migrations

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type RUN to execute Alembic against the production database."
        required: true

permissions:
  contents: read
  id-token: write

env:
  PYTHON_VERSION: "3.13"

jobs:
  migrate:
    name: Alembic upgrade head
    runs-on: [self-hosted, azure-vnet]
    if: inputs.confirm == 'RUN'
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v8
      - name: Log in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Run Alembic migrations
        working-directory: backend-serverless
        shell: bash
        run: |
          set -euo pipefail
          database_url="$(az keyvault secret show \
            --vault-name "${{ vars.AZURE_KEYVAULT_NAME }}" \
            --name database-url \
            --query value \
            --output tsv)"
          DATABASE_URL="$database_url" \
            UV_PROJECT_ENVIRONMENT="${{ runner.temp }}/migration-venv" \
            uv run --frozen alembic upgrade head
