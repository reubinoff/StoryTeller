version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/backend-serverless"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      backend-serverless:
        patterns: ["*"]
        update-types:
          - minor
          - patch

  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
